name: Feature request
description: Suggest a focused improvement to WP Swiper
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: checkboxes
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for this request.
          required: true
  - type: textarea
    attributes:
      label: Problem or use case
      description: Explain the user need rather than only the proposed implementation.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed behavior
      description: Describe how the feature should work in the editor and frontend.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives considered
  - type: textarea
    attributes:
      label: Additional context
