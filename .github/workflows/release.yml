name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          coverage: none

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag
        run: npm run verify:tag

      - name: Check PHP syntax
        run: find . -path ./node_modules -prune -o -path ./dist-zip -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Build and verify package
        run: npm run package

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist-zip/wp-swiper.zip --generate-notes --title "$GITHUB_REF_NAME" --verify-tag
