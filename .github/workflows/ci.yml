name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          coverage: none

      - name: Install dependencies
        run: npm ci

      - name: Check PHP syntax
        run: find . -path ./node_modules -prune -o -path ./dist-zip -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Build and verify package
        run: npm run package

      - name: Upload plugin archive
        uses: actions/upload-artifact@v7
        with:
          name: wp-swiper
          path: dist-zip/wp-swiper.zip
          if-no-files-found: error
